environment:
  name: "Factory Robot Task Coordination"
  description: "A time-based dispatch simulation for coordinating mobile and static robots across a staged factory backlog with release times, priorities, and SLA pressure."
  version: "2.0.0"
  benchmark: "factory_robot_openenv"
  objective: "Dispatch released work orders to the correct specialist stations while maximizing on-time completion and controlling overdue backlog."

tasks:
  - name: "easy"
    description: "Single-cell assembly dispatch with a rush order, staged release timing, and simple priority tradeoffs"
    grader: "grader.grade_task('easy', state)"
  - name: "medium"
    description: "Mixed assembly and welding schedule with staged releases, specialist bottlenecks, and moderate SLA pressure"
    grader: "grader.grade_task('medium', state)"
  - name: "hard"
    description: "Multi-cell backlog with staggered arrivals, inspection bottlenecks, and persistent overdue-backlog risk"
    grader: "grader.grade_task('hard', state)"

observation_space:
  jobs: "List of current jobs with transport and processing status, source zone, release step, due step, priority, overdue time, required station type, remaining time, and assigned robots"
  mobile_robots: "List of mobile robots with occupancy, busy time remaining, current job, and current task"
  static_robots: "List of static robots with occupancy, busy time remaining, current job, capability, and home cell"
  time_step: "Current simulation time step integer"
  metrics: "Episode-level statistics for action quality, released work, overdue backlog, priority-weighted completion quality, robot utilization, progress, and total reward"

typed_models:
  observation: "env.models.FactoryObservation"
  action: "env.models.FactoryAction"
  reward: "env.models.FactoryReward"

action_space:
  transport: "Assign an idle mobile robot to a released job that has not yet been transported. Format: ('transport', robot_id, job_id)"
  process: "Assign an idle specialist station robot to a transported job with matching capability. Format: ('process', robot_id, job_id)"
  wait: "Advance the simulation when no productive assignment is available. Format: ('wait', None, None)"

rewards:
  valid_assignment: 0.10
  transport_completed: 0.15
  job_completed: 0.25
  priority_weight_reward: 0.03
  on_time_completion_bonus: 0.18
  late_completion_penalty: 0.08
  invalid_action: 0.00
  idle_robot_penalty: 0.02
  waiting_job_penalty: 0.01
  overdue_job_penalty: 0.02
  normalized_range: "[0.0, 1.0]"

api:
  reset: "POST /reset"
  step: "POST /step"
  state: "GET /state"
